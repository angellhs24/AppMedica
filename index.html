<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .progress-ring-container { transition: background 0.5s ease; }
        .chart-line { stroke: #38bdf8; stroke-width: 2.5; fill: none; stroke-linecap: round; }
        .heart-line { stroke: #ef4444; stroke-width: 2.5; fill: none; stroke-linecap: round; }
        .sleep-bar { fill: #8b5cf6; }
        .calories-line { stroke: #f97316; stroke-width: 2.5; fill: none; stroke-linecap: round; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.4); display: flex; align-items: center; justify-content: center; z-index: 50; }
        .modal-content { max-width: 90%; }
    </style>
</head>
<body class="bg-slate-900 flex justify-center items-center min-h-screen">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [tab, setTab] = useState('home');
            const [showNotifications, setShowNotifications] = useState(false);
            const [showAppointmentDetails, setShowAppointmentDetails] = useState(false);

            return (
                <div className="w-[390px] h-[844px] bg-gradient-to-tr from-cyan-100 to-blue-200 relative overflow-hidden rounded-[3rem] shadow-2xl border-[8px] border-white">
                    
                    {showNotifications && <NotificationPanel onClose={() => setShowNotifications(false)} />}
                    {showAppointmentDetails && <AppointmentDetailsModal onClose={() => setShowAppointmentDetails(false)} />}

                    <div className="p-6 h-full pb-28 overflow-y-auto scrollbar-hide">
                       {tab === 'home' && <HomeTab onShowNotifications={() => setShowNotifications(true)} onShowAppointmentDetails={() => setShowAppointmentDetails(true)} />}
                       {tab === 'consultas' && <GenericTab title="Consultas" />}
                       {tab === 'chequeos' && <GenericTab title="Chequeos" />}
                       {tab === 'perfil' && <GenericTab title="Perfil" />}
                    </div>

                    <nav className="absolute bottom-6 left-6 right-6 h-20 bg-white/60 backdrop-blur-md rounded-full flex items-center justify-around shadow-lg">
                        <NavButton id="home" label="Inicio" icon={<HomeIcon />} activeTab={tab} setTab={setTab} />
                        <NavButton id="consultas" label="Consultas" icon={<ConsultasIcon />} activeTab={tab} setTab={setTab} />
                        <NavButton id="chequeos" label="Chequeos" icon={<ChequeosIcon />} activeTab={tab} setTab={setTab} />
                        <NavButton id="perfil" label="Perfil" icon={<PerfilIcon />} activeTab={tab} setTab={setTab} />
                    </nav>
                </div>
            );
        };
        
        const HomeTab = ({ onShowNotifications, onShowAppointmentDetails }) => {
            const [healthScore, setHealthScore] = useState(100);

            const getScoreColor = (score) => {
                if (score > 75) return { ring: '#4ade80', text: 'text-green-500' };
                if (score > 50) return { ring: '#facc15', text: 'text-yellow-500' };
                return { ring: '#ef4444', text: 'text-red-500' };
            };

            const scoreColor = getScoreColor(healthScore);
            
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h1 className="text-3xl font-bold text-slate-800">¡Hola, Angel!</h1>
                        <button onClick={onShowNotifications} className="w-10 h-10 bg-white/70 rounded-full flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-blue-400">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 00-5-5.917V5a3 3 0 00-6 0v.083A6 6 0 002 11v3.159c0 .538-.214 1.055-.595 1.436L0 17h5m10 0v1a3 3 0 01-6 0v-1m6 0H9" /></svg>
                        </button>
                    </div>
                    
                    <div className="glass rounded-3xl p-6 flex flex-col items-center text-center shadow-md">
                        <p className="font-medium text-slate-600 mb-2">Puntuación de Salud <span className="text-xs">ⓘ</span></p>
                        <div className="w-40 h-40 rounded-full progress-ring-container flex items-center justify-center" style={{ background: `conic-gradient(${scoreColor.ring} 0% ${healthScore}%, #e5e7eb ${healthScore}% 100%)`}}>
                            <div className="w-[125px] h-[125px] bg-white/80 rounded-full flex items-center justify-center">
                                <span className={`text-5xl font-extrabold ${scoreColor.text}`}>{healthScore}</span>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                         <div className="glass p-4 rounded-2xl shadow-sm col-span-1 flex flex-col">
                            <div className="flex justify-between items-start mb-2">
                                <p className="text-sm font-medium text-slate-600">Próxima Cita</p>
                                <div className="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center flex-shrink-0">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                </div>
                            </div>
                            <div className="flex-grow">
                                <p className="text-md font-bold text-slate-800">Dr. Pérez</p>
                                <p className="text-sm text-slate-600">Dic 12, 10:30 AM</p>
                                <p className="text-xs text-slate-500 mt-1">Lugar: IMSS Clínica 2</p>
                            </div>
                            <button onClick={onShowAppointmentDetails} className="text-xs text-blue-600 font-bold mt-3 text-left w-full">Ver detalles →</button>
                        </div>
                        <div className="glass p-4 rounded-2xl shadow-sm space-y-2">
                             <p className="text-sm font-medium text-slate-600">Chequeos Pendientes</p>
                             <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center"><svg className="h-5 w-5 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path><path fillRule="evenodd" d="M4 5a2 2 0 012-2h8a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h4a1 1 0 100-2H7z" clipRule="evenodd"></path></svg></div>
                                <div><p className="text-xs font-semibold text-slate-800">Dentista</p><p className="text-xs text-slate-500">En 2 días</p></div>
                             </div>
                             <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 bg-purple-100 rounded-lg flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg></div>
                                <div><p className="text-xs font-semibold text-slate-800">Oftalmología</p><p className="text-xs text-slate-500">En 1 semana</p></div>
                             </div>
                        </div>
                    </div>
                    
                    <h2 className="text-xl font-bold text-slate-800 pt-2">Tus Datos</h2>
                    <div className="grid grid-cols-2 gap-4">
                        <div className="glass p-4 rounded-2xl">
                           <div className="flex justify-between items-start"><div><p className="text-sm font-semibold text-slate-600">Pasos</p></div><span className="text-blue-500 font-bold">!!</span></div>
                            <svg viewBox="0 0 100 40" className="mt-2"><polyline className="chart-line" points="0,30 15,20 30,25 45,15 60,18 75,10 90,15 100,5" /></svg>
                            <div className="flex justify-between text-xs text-slate-400 mt-1"><p>1,000</p><p>2,500</p></div>
                        </div>
                        <div className="glass p-4 rounded-2xl">
                            <div className="flex justify-between items-start"><div><p className="text-sm font-semibold text-slate-600">Ritmo Cardiaco</p></div><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-red-500" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clipRule="evenodd" /></svg></div>
                            <svg viewBox="0 0 100 40" className="mt-2"><polyline className="heart-line" points="0,20 10,20 15,10 20,30 25,15 30,22 35,20 40,20 45,10 50,30 55,15 60,22 65,20 70,20 75,10 80,30 85,15 90,22 95,20 100,20" /></svg>
                            <div className="flex justify-between text-xs text-slate-400 mt-1"><p>60</p><p>120</p></div>
                        </div>
                        <div className="glass p-4 rounded-2xl">
                           <div className="flex justify-between items-start"><div><p className="text-sm font-semibold text-slate-600">Horas de Sueño</p></div><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-purple-500" viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" /></svg></div>
                            <svg viewBox="0 0 100 40" className="mt-2">
                                <rect className="sleep-bar" x="5" y="15" width="10" height="25" rx="2"/><rect className="sleep-bar" x="20" y="10" width="10" height="30" rx="2"/><rect className="sleep-bar" x="35" y="20" width="10" height="20" rx="2"/><rect className="sleep-bar" x="50" y="5" width="10" height="35" rx="2"/><rect className="sleep-bar" x="65" y="12" width="10" height="28" rx="2"/><rect className="sleep-bar" x="80" y="25" width="10" height="15" rx="2"/>
                            </svg>
                            <div className="flex justify-between text-xs text-slate-400 mt-1"><p>4h</p><p>8h</p></div>
                        </div>
                        <div className="glass p-4 rounded-2xl">
                           <div className="flex justify-between items-start"><div><p className="text-sm font-semibold text-slate-600">Calorías</p></div><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-orange-500" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M12.28 17.28a.75.75 0 010-1.06l4.25-4.25H4.75a.75.75 0 010-1.5h11.78l-4.25-4.25a.75.75 0 111.06-1.06l5.5 5.5a.75.75 0 010 1.06l-5.5 5.5a.75.75 0 01-1.06 0z" clipRule="evenodd" /></svg></div>
                            <svg viewBox="0 0 100 40" className="mt-2"><polyline className="calories-line" points="0,35 15,25 30,30 45,20 60,22 75,15 90,20 100,10" /></svg>
                             <div className="flex justify-between text-xs text-slate-400 mt-1"><p>300</p><p>800</p></div>
                        </div>
                    </div>
                </div>
            );
        };

        const NotificationPanel = ({ onClose }) => {
            const notifications = [
                { type: 'cita', text: 'Tu cita con el Dr. Pérez es mañana.', time: 'hace 5 min' },
                { type: 'medicamento', text: 'No olvides tomar tus medicamentos.', time: 'hace 1 hora' },
                { type: 'logro', text: 'Nuevo record de pasos: ¡12,000!', time: 'hace 3 horas' }
            ];

            const icons = {
                cita: <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
                medicamento: <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 3v2m6-2v2M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm6 0v-6a2 2 0 00-2-2h-2a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2z" /></svg>,
                logro: <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
            };

            return (
                <div className="modal-overlay">
                    <div className="modal-content glass rounded-2xl p-4 w-full max-w-sm shadow-lg border-2 border-white/50">
                        <div className="flex justify-between items-center mb-4 px-2">
                            <h3 className="font-bold text-lg text-slate-800">Notificaciones</h3>
                            <button onClick={onClose} className="text-slate-600 font-bold text-xl">×</button>
                        </div>
                        <div className="space-y-3">
                            {notifications.map((item, index) => (
                                <div key={index} className="bg-white/50 rounded-lg p-3 flex items-center space-x-3">
                                    <div className="flex-shrink-0 w-10 h-10 flex items-center justify-center">{icons[item.type]}</div>
                                    <div className="flex-grow">
                                        <p className="text-sm text-slate-800">{item.text}</p>
                                        <p className="text-xs text-slate-500">{item.time}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };
        
        const AppointmentDetailsModal = ({ onClose }) => (
            <div className="modal-overlay">
                <div className="modal-content glass rounded-2xl p-6 w-full max-w-sm shadow-lg">
                    <button onClick={onClose} className="absolute top-4 right-4 text-slate-600 font-bold text-xl">×</button>
                    <div className="text-center">
                        <div className="w-16 h-16 bg-blue-100 rounded-full mx-auto flex items-center justify-center mb-4">
                             <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        </div>
                        <h3 className="font-bold text-xl text-slate-800">Próxima Cita</h3>
                        <p className="text-slate-500 text-sm">Medicina General</p>
                    </div>
                    <div className="mt-6 space-y-4">
                        <div className="flex items-center space-x-3">
                             <div className="bg-slate-200/70 p-2 rounded-lg"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></div>
                             <div>
                                <p className="text-sm font-semibold text-slate-700">Dr. Pérez</p>
                                <p className="text-xs text-slate-500">Médico Familiar</p>
                             </div>
                        </div>
                         <div className="flex items-center space-x-3">
                             <div className="bg-slate-200/70 p-2 rounded-lg"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg></div>
                             <div>
                                <p className="text-sm font-semibold text-slate-700">IMSS Clínica 2</p>
                                <p className="text-xs text-slate-500">Av. Siempre Viva 123</p>
                             </div>
                        </div>
                         <div className="flex items-center space-x-3">
                             <div className="bg-slate-200/70 p-2 rounded-lg"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                             <div>
                                <p className="text-sm font-semibold text-slate-700">Diciembre 12, 2024</p>
                                <p className="text-xs text-slate-500">10:30 AM</p>
                             </div>
                        </div>
                    </div>
                     <div className="mt-6 bg-blue-50 p-3 rounded-lg text-center">
                        <p className="text-sm text-blue-800">Recuerda llegar 15 minutos antes y traer tu identificación.</p>
                     </div>
                </div>
            </div>
        );

        const GenericTab = ({ title }) => <div className="text-center pt-20"><h2 className="text-2xl font-bold">{title}</h2></div>;
        const NavButton = ({ id, label, icon, activeTab, setTab }) => { const isActive = activeTab === id; return ( <button onClick={() => setTab(id)} className={`flex flex-col items-center justify-center transition-all duration-300 ${isActive ? 'text-blue-600' : 'text-slate-500'}`}><div className={`transition-all duration-300 ${isActive ? 'opacity-100' : 'opacity-70'}`}>{icon}</div><span className={`text-xs mt-1 transition-all duration-300 ${isActive ? 'font-semibold' : 'font-normal'}`}>{label}</span></button> ) };
        const HomeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>;
        const ConsultasIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>;
        const ChequeosIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>;
        const PerfilIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>;

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
