<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .progress-ring-container { transition: background 0.5s ease; }
        .chart-line { stroke: #38bdf8; stroke-width: 2.5; fill: none; stroke-linecap: round; }
        .heart-line { stroke: #ef4444; stroke-width: 2.5; fill: none; stroke-linecap: round; }
        .sleep-bar { fill: #8b5cf6; }
        .calories-line { stroke: #f97316; stroke-width: 2.5; fill: none; stroke-linecap: round; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.4); display: flex; align-items: center; justify-content: center; z-index: 50; }
        .modal-fullscreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 60;
        }
    </style>
</head>
<body class="bg-slate-900 flex justify-center items-center min-h-screen">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [tab, setTab] = useState('home');
            const [showNotifications, setShowNotifications] = useState(false);
            const [showAppointmentDetails, setShowAppointmentDetails] = useState(false);
            const [showAgendaForm, setShowAgendaForm] = useState(false);

            return (
                <div className="w-[390px] h-[844px] bg-gradient-to-tr from-cyan-100 to-blue-200 relative overflow-hidden rounded-[3rem] shadow-2xl border-[8px] border-white">
                    
                    {showNotifications && <NotificationPanel onClose={() => setShowNotifications(false)} />}
                    {showAppointmentDetails && <AppointmentDetailsModal onClose={() => setShowAppointmentDetails(false)} />}
                    {showAgendaForm && <AgendaForm onClose={() => setShowAgendaForm(false)} />}

                    <div className="p-6 h-full pb-28 overflow-y-auto scrollbar-hide">
                       {tab === 'home' && <HomeTab onShowNotifications={() => setShowNotifications(true)} onShowAppointmentDetails={() => setShowAppointmentDetails(true)} />}
                       {tab === 'consultas' && <ConsultasTab onAgendar={() => setShowAgendaForm(true)} />}
                       {tab === 'chequeos' && <GenericTab title="Chequeos" />}
                       {tab === 'perfil' && <GenericTab title="Perfil" />}
                    </div>

                    <nav className="absolute bottom-6 left-6 right-6 h-20 bg-white/60 backdrop-blur-md rounded-full flex items-center justify-around shadow-lg">
                        <NavButton id="home" label="Inicio" icon={<HomeIcon />} activeTab={tab} setTab={setTab} />
                        <NavButton id="consultas" label="Consultas" icon={<ConsultasIcon />} activeTab={tab} setTab={setTab} />
                        <NavButton id="chequeos" label="Chequeos" icon={<ChequeosIcon />} activeTab={tab} setTab={setTab} />
                        <NavButton id="perfil" label="Perfil" icon={<PerfilIcon />} activeTab={tab} setTab={setTab} />
                    </nav>
                </div>
            );
        };
        
        const HomeTab = ({ onShowNotifications, onShowAppointmentDetails }) => {
            const healthScore = 92;
            const getScoreColor = (score) => {
                if (score > 75) return { ring: '#4ade80', text: 'text-green-500' };
                if (score > 50) return { ring: '#facc15', text: 'text-yellow-500' };
                return { ring: '#ef4444', text: 'text-red-500' };
            };
            const scoreColor = getScoreColor(healthScore);
            
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h1 className="text-3xl font-bold text-slate-800">¡Hola, Angel!</h1>
                        <button onClick={onShowNotifications} className="w-10 h-10 bg-white/70 rounded-full flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-blue-400"><BellIcon /></button>
                    </div>
                    
                    <div className="glass rounded-3xl p-6 flex flex-col items-center text-center shadow-md">
                        <p className="font-medium text-slate-600 mb-2">Puntuación de Salud <span className="text-xs">ⓘ</span></p>
                        <div className="w-40 h-40 rounded-full progress-ring-container flex items-center justify-center" style={{ background: `conic-gradient(${scoreColor.ring} 0% ${healthScore}%, #e5e7eb ${healthScore}% 100%)`}}>
                            <div className="w-[125px] h-[125px] bg-white/80 rounded-full flex items-center justify-center">
                                <span className={`text-5xl font-extrabold ${scoreColor.text}`}>{healthScore}</span>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                         <div className="glass p-4 rounded-2xl shadow-sm col-span-1 flex flex-col">
                            <div className="flex justify-between items-start mb-2">
                                <p className="text-sm font-medium text-slate-600">Próxima Cita</p>
                                <div className="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center flex-shrink-0"><CalendarIcon className="h-5 w-5 text-blue-600"/></div>
                            </div>
                            <div className="flex-grow">
                                <p className="text-md font-bold text-slate-800">Dr. Pérez</p>
                                <p className="text-sm text-slate-600">Dic 12, 10:30 AM</p>
                                <p className="text-xs text-slate-500 mt-1">Lugar: IMSS Clínica 2</p>
                            </div>
                            <button onClick={onShowAppointmentDetails} className="text-xs text-blue-600 font-bold mt-3 text-left w-full">Ver detalles →</button>
                        </div>
                        <div className="glass p-4 rounded-2xl shadow-sm space-y-2">
                             <p className="text-sm font-medium text-slate-600">Chequeos Pendientes</p>
                             <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center"><ClipboardListIcon className="h-5 w-5 text-blue-500"/></div>
                                <div><p className="text-xs font-semibold text-slate-800">Dentista</p><p className="text-xs text-slate-500">En 2 días</p></div>
                             </div>
                             <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 bg-purple-100 rounded-lg flex items-center justify-center"><EyeIcon className="h-5 w-5 text-purple-600" /></div>
                                <div><p className="text-xs font-semibold text-slate-800">Oftalmología</p><p className="text-xs text-slate-500">En 1 semana</p></div>
                             </div>
                        </div>
                    </div>
                    <h2 className="text-xl font-bold text-slate-800 pt-2">Tus Datos</h2>
                     <div className="grid grid-cols-2 gap-4">
                        <div className="glass p-4 rounded-2xl">
                           <div className="flex justify-between items-start"><div><p className="text-sm font-semibold text-slate-600">Pasos</p></div><span className="text-blue-500 font-bold">!!</span></div>
                            <svg viewBox="0 0 100 40" className="mt-2"><polyline className="chart-line" points="0,30 15,20 30,25 45,15 60,18 75,10 90,15 100,5" /></svg>
                            <div className="flex justify-between text-xs text-slate-400 mt-1"><p>1,000</p><p>2,500</p></div>
                        </div>
                        <div className="glass p-4 rounded-2xl">
                            <div className="flex justify-between items-start"><div><p className="text-sm font-semibold text-slate-600">Ritmo Cardiaco</p></div><HeartIcon className="h-5 w-5 text-red-500"/></div>
                            <svg viewBox="0 0 100 40" className="mt-2"><polyline className="heart-line" points="0,20 10,20 15,10 20,30 25,15 30,22 35,20 40,20 45,10 50,30 55,15 60,22 65,20 70,20 75,10 80,30 85,15 90,22 95,20 100,20" /></svg>
                            <div className="flex justify-between text-xs text-slate-400 mt-1"><p>60</p><p>120</p></div>
                        </div>
                        <div className="glass p-4 rounded-2xl">
                           <div className="flex justify-between items-start"><div><p className="text-sm font-semibold text-slate-600">Horas de Sueño</p></div><MoonIcon className="h-5 w-5 text-purple-500"/></div>
                            <svg viewBox="0 0 100 40" className="mt-2">
                                <rect className="sleep-bar" x="5" y="15" width="10" height="25" rx="2"/><rect className="sleep-bar" x="20" y="10" width="10" height="30" rx="2"/><rect className="sleep-bar" x="35" y="20" width="10" height="20" rx="2"/><rect className="sleep-bar" x="50" y="5" width="10" height="35" rx="2"/><rect className="sleep-bar" x="65" y="12" width="10" height="28" rx="2"/><rect className="sleep-bar" x="80" y="25" width="10" height="15" rx="2"/>
                            </svg>
                            <div className="flex justify-between text-xs text-slate-400 mt-1"><p>4h</p><p>8h</p></div>
                        </div>
                        <div className="glass p-4 rounded-2xl">
                           <div className="flex justify-between items-start"><div><p className="text-sm font-semibold text-slate-600">Calorías</p></div><FireIcon className="h-5 w-5 text-orange-500"/></div>
                            <svg viewBox="0 0 100 40" className="mt-2"><polyline className="calories-line" points="0,35 15,25 30,30 45,20 60,22 75,15 90,20 100,10" /></svg>
                             <div className="flex justify-between text-xs text-slate-400 mt-1"><p>300</p><p>800</p></div>
                        </div>
                    </div>
                </div>
            );
        };
        
        const ConsultasTab = ({ onAgendar }) => {
            const pastConsultations = [
                { icon: 'general', specialty: 'CONSULTA GENERAL', doctor: 'Dr. Martinez', date: 'Dec 10', summary: 'Gripa, Meds: Amoxicilina' },
                { icon: 'oftalmo', specialty: 'CHEQUEO OFTALMOLOGÍA', doctor: 'Dr. Fernandez', date: 'Nov 22', summary: 'Receta lentes' },
                { icon: 'surgery', specialty: 'CIRUGÍA APÉNDICE', doctor: 'Dra. Ramos', date: 'Ene 15', summary: 'Recuperación exitosa' },
            ];

            const icons = {
                general: <UserIcon className="h-5 w-5 text-blue-600"/>,
                oftalmo: <EyeIcon className="h-5 w-5 text-purple-600"/>,
                surgery: <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-red-600" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 3a1 1 0 011 1v4h4a1 1 0 110 2h-4v4a1 1 0 11-2 0v-4H5a1 1 0 110-2h4V4a1 1 0 011-1z" clipRule="evenodd" /></svg>
            };

            return (
                <div className="space-y-6">
                    <h1 className="text-3xl font-bold text-slate-800">Consultas</h1>

                    <div onClick={onAgendar} className="bg-gradient-to-r from-blue-500 to-indigo-600 rounded-2xl p-6 text-white shadow-lg flex items-center justify-between cursor-pointer hover:shadow-xl transition-shadow">
                        <div>
                            <h2 className="font-bold text-xl">Agendar Consulta</h2>
                            <p className="text-sm opacity-90">Encuentra especialistas y reserva tu cita.</p>
                        </div>
                        <div className="w-12 h-12 bg-white/30 rounded-full flex items-center justify-center"><PlusIcon/></div>
                    </div>

                    <div className="glass p-4 rounded-2xl">
                        <h3 className="font-bold text-slate-800">Asistente de IA</h3>
                        <p className="text-sm text-slate-600 mb-3">Resuelve tus dudas médicas al instante.</p>
                        <button className="w-full bg-purple-600 text-white font-bold p-2 rounded-lg hover:bg-purple-700 transition-colors text-sm">Pregúntale a la IA</button>
                    </div>

                    <div className="flex justify-between items-center">
                        <h2 className="text-xl font-bold text-slate-800">Tus Consultas Previas</h2>
                        <button className="flex items-center text-blue-600 text-sm font-semibold glass rounded-lg px-3 py-1"><FilterIcon /> Filtrar</button>
                    </div>

                    <div className="relative border-l-2 border-cyan-200 pl-6">
                        {pastConsultations.map((item, index) => (
                             <div key={index} className="mb-8 relative">
                                <div className="absolute -left-[34px] top-0 w-8 h-8 rounded-full bg-white flex items-center justify-center border-2 border-cyan-200">
                                    {icons[item.icon]}
                                </div>
                                <div className="glass p-4 rounded-xl">
                                    <p className="font-bold text-slate-700 text-sm">{item.specialty}</p>
                                    <p className="text-xs text-slate-500">{item.date} - {item.doctor}</p>
                                    <p className="text-xs text-slate-600 mt-1">{item.summary}</p>
                                    <button className="text-xs font-bold text-blue-600 mt-2">Ver detalles</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const AgendaForm = ({ onClose }) => {
            const [selectedTime, setSelectedTime] = useState('04:00');
            const dates = [{d:'13', m:'Dec'},{d:'14', m:'Jun'},{d:'15', m:'Dec', s:true},{d:'16', m:'Sev'},{d:'17', m:'Mor'}];
            const times = ['05:00','04:00','06:00','07:00','09:00','10:00','14:00','15:00','16:00','18:00','20:00','22:00'];
            const doctors = [{name: 'Dr. Carmen Ruiz', rating: 4.8, img: 'https://randomuser.me/api/portraits/women/44.jpg'}, {name: 'Dr. Ricardo Diaz', rating: 4.5, img: 'https://randomuser.me/api/portraits/men/44.jpg'}]
            
            return (
                <div className="modal-fullscreen bg-gradient-to-tr from-cyan-100 to-blue-200">
                    <div className="p-6 h-full overflow-y-auto scrollbar-hide">
                        <div className="flex items-center mb-4">
                            <button onClick={onClose} className="text-slate-700"><ChevronLeftIcon /></button>
                            <h2 className="text-xl font-bold text-slate-800 ml-4">Agendar Consulta</h2>
                        </div>

                        <div className="relative mb-4">
                            <input type="text" placeholder="Buscar Especialidad o Médico" className="w-full p-3 pl-10 rounded-lg bg-white/80 border-2 border-transparent focus:border-blue-400 focus:ring-0 focus:outline-none text-sm" />
                            <SearchIcon className="absolute left-3 top-3.5 h-5 w-5 text-slate-400" />
                        </div>

                        <div className="flex justify-between mb-4 space-x-2">
                             {dates.map(date => (
                                <div key={date.d} className={`w-1/5 rounded-lg text-center p-2 ${date.s ? 'bg-blue-600 text-white' : 'bg-white/70'}`}>
                                    <p className="text-xs">{date.m}</p>
                                    <p className="font-bold text-lg">{date.d}</p>
                                </div>
                             ))}
                        </div>

                        <div className="grid grid-cols-4 gap-2 mb-4">
                             {times.map(time => (
                                <button key={time} onClick={() => setSelectedTime(time)} className={`p-2 rounded-lg text-sm ${selectedTime === time ? 'bg-blue-600 text-white' : 'bg-white/70'}`}>
                                    {time}
                                </button>
                             ))}
                        </div>

                        <div className="flex justify-between items-center glass p-3 rounded-lg mb-6">
                            <span className="text-sm font-semibold text-slate-700">Telemedicina</span>
                            <div className="w-12 h-6 flex items-center bg-slate-300 rounded-full p-1 cursor-pointer">
                                <div className="bg-white w-4 h-4 rounded-full shadow-md transform transition-transform duration-300 ease-in-out"></div>
                            </div>
                        </div>
                        
                        <div className="space-y-3">
                            {doctors.map(doc => (
                                 <div key={doc.name} className="glass p-3 rounded-lg flex items-center">
                                    <img src={doc.img} className="w-12 h-12 rounded-full" />
                                    <div className="flex-grow ml-3">
                                        <p className="text-sm font-bold text-slate-800">{doc.name}</p>
                                        <span className="text-xs">⭐ {doc.rating}</span>
                                    </div>
                                    <button className="bg-blue-500 text-white text-xs font-bold px-4 py-2 rounded-lg hover:bg-blue-600">RESERVAR</button>
                                 </div>
                            ))}
                        </div>
                    </div>
                </div>
            )
        }

        const NotificationPanel = ({ onClose }) => { const notifications = [{ type: 'cita', text: 'Tu cita con el Dr. Pérez es mañana.', time: 'hace 5 min' },{ type: 'medicamento', text: 'No olvides tomar tus medicamentos.', time: 'hace 1 hora' },{ type: 'logro', text: 'Nuevo record de pasos: ¡12,000!', time: 'hace 3 horas' }]; const icons = { cita: <CalendarIcon className="h-6 w-6 text-blue-500"/>, medicamento: <PillIcon className="h-6 w-6 text-green-500"/>, logro: <TrendingUpIcon className="h-6 w-6 text-yellow-500" /> }; return ( <div className="modal-overlay"><div className="modal-content glass rounded-2xl p-4 w-full max-w-sm shadow-lg border-2 border-white/50"><div className="flex justify-between items-center mb-4 px-2"><h3 className="font-bold text-lg text-slate-800">Notificaciones</h3><button onClick={onClose} className="text-slate-600 font-bold text-xl">×</button></div><div className="space-y-3">{notifications.map((item, index) => ( <div key={index} className="bg-white/50 rounded-lg p-3 flex items-center space-x-3"><div className="flex-shrink-0 w-10 h-10 flex items-center justify-center">{icons[item.type]}</div><div className="flex-grow"><p className="text-sm text-slate-800">{item.text}</p><p className="text-xs text-slate-500">{item.time}</p></div></div> ))}</div></div></div> );};
        const AppointmentDetailsModal = ({ onClose }) => ( <div className="modal-overlay"><div className="modal-content glass rounded-2xl p-6 w-full max-w-sm shadow-lg"><button onClick={onClose} className="absolute top-4 right-4 text-slate-600 font-bold text-xl">×</button><div className="text-center"><div className="w-16 h-16 bg-blue-100 rounded-full mx-auto flex items-center justify-center mb-4"><CalendarIcon className="h-8 w-8 text-blue-600" /></div><h3 className="font-bold text-xl text-slate-800">Próxima Cita</h3><p className="text-slate-500 text-sm">Medicina General</p></div><div className="mt-6 space-y-4"><div className="flex items-center space-x-3"><div className="bg-slate-200/70 p-2 rounded-lg"><UserIcon className="h-5 w-5 text-slate-600"/></div><div><p className="text-sm font-semibold text-slate-700">Dr. Pérez</p><p className="text-xs text-slate-500">Médico Familiar</p></div></div><div className="flex items-center space-x-3"><div className="bg-slate-200/70 p-2 rounded-lg"><LocationMarkerIcon className="h-5 w-5 text-slate-600" /></div><div><p className="text-sm font-semibold text-slate-700">IMSS Clínica 2</p><p className="text-xs text-slate-500">Av. Siempre Viva 123</p></div></div><div className="flex items-center space-x-3"><div className="bg-slate-200/70 p-2 rounded-lg"><ClockIcon className="h-5 w-5 text-slate-600" /></div><div><p className="text-sm font-semibold text-slate-700">Diciembre 12, 2024</p><p className="text-xs text-slate-500">10:30 AM</p></div></div></div><div className="mt-6 bg-blue-50 p-3 rounded-lg text-center"><p className="text-sm text-blue-800">Recuerda llegar 15 minutos antes y traer tu identificación.</p></div></div></div> );
        
        /* Icon Components */
        const BellIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 00-5-5.917V5a3 3 0 00-6 0v.083A6 6 0 002 11v3.159c0 .538-.214 1.055-.595 1.436L0 17h5m10 0v1a3 3 0 01-6 0v-1m6 0H9" /></svg>;
        const CalendarIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>;
        const ClipboardListIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path><path fillRule="evenodd" d="M4 5a2 2 0 012-2h8a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h4a1 1 0 100-2H7z" clipRule="evenodd"></path></svg>;
        const EyeIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>;
        const TrendingUpIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>;
        const HeartIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clipRule="evenodd" /></svg>;
        const MoonIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" /></svg>;
        const FireIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M12.28 17.28a.75.75 0 010-1.06l4.25-4.25H4.75a.75.75 0 010-1.5h11.78l-4.25-4.25a.75.75 0 111.06-1.06l5.5 5.5a.75.75 0 010 1.06l-5.5 5.5a.75.75 0 01-1.06 0z" clipRule="evenodd" /></svg>;
        const PillIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 3v2m6-2v2M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm6 0v-6a2 2 0 00-2-2h-2a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2z" /></svg>;
        const UserIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>;
