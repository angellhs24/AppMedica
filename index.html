
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0EA5E9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AppMedica">
    <link rel="apple-touch-icon" href="icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.4); display: flex; align-items: center; justify-content: center; z-index: 50; }
        .modal-fullscreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 60; background-color: #e0f2fe; }
        .chart-line { stroke-width: 2.5; fill: none; stroke-linecap: round; }
        .sleep-bar { fill: #8b5cf6; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes progress-bar {
            from { width: 0%; }
            to { width: 100%; }
        }
        .animate-progress {
            animation: progress-bar 4s linear forwards;
        }

        .story-image {
            animation: fadeIn 1s ease-in-out;
        }
    </style>
</head>
<body class="bg-black">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        const LoginScreen = ({ onLoginSuccess, showInstallBanner, installEvent, setShowInstallBanner }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                
                const { data: { user }, error } = await window.supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    setError(error.message);
                    setLoading(false);
                } else if (user) {
                    const { data: profile, error: profileError } = await window.supabase
                        .from('patients')
                        .select('full_name, profile_pic_url')
                        .eq('id', user.id)
                        .single();

                    if (profile) {
                         localStorage.setItem('rememberedUser', JSON.stringify({ 
                            email: user.email, 
                            name: profile.full_name, 
                            profilePic: profile.profile_pic_url 
                        }));
                    }
                    onLoginSuccess();
                }
            };

            return (
                <div className="w-screen h-screen bg-gradient-to-tr from-cyan-200 to-blue-300 relative overflow-hidden flex flex-col justify-center p-8">
                    {showInstallBanner && <div className="absolute top-0 left-0 right-0 bg-blue-500 text-white p-4 z-50 flex justify-between items-center"><p className="text-sm">Instala la app para una mejor experiencia.</p><div><button onClick={() => installEvent.prompt()} className="bg-white text-blue-500 font-bold py-1 px-3 rounded-lg mr-2 text-sm">Instalar</button><button onClick={() => setShowInstallBanner(false)} className="font-bold text-sm">X</button></div></div>}
                    <div className="glass rounded-2xl p-8 pt-12 mt-12 fade-in">
                        <div className="text-center mb-8">
                            <h1 className="text-2xl font-bold text-slate-800">Accede a tu Expediente</h1>
                            <p className="text-slate-600 text-sm">Tu salud, siempre a tu alcance.</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" placeholder="Email de Usuario" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full p-3 rounded-lg bg-white/80 border-2 border-transparent focus:border-blue-400 focus:ring-0 focus:outline-none text-sm transition-all" required />
                            <input type="password" placeholder="Contraseña" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full p-3 rounded-lg bg-white/80 border-2 border-transparent focus:border-blue-400 focus:ring-0 focus:outline-none text-sm transition-all" required />
                            {error && <p className="text-red-500 text-xs text-center">{error}</p>}
                            <button type="submit" disabled={loading} className="w-full mt-4 bg-indigo-600 text-white font-bold p-3 rounded-lg hover:bg-indigo-700 transition-transform transform hover:scale-105 disabled:bg-indigo-400">
                                {loading ? 'Iniciando...' : 'Iniciar Sesión'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };
        
         const PreLoginScreen = ({ rememberedUser, onShowPasswordModal, onShowConfirmLogout }) => {
            const storyImages = [
                "https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=2070&auto=format&fit=crop",
                "https://images.unsplash.com/photo-1532187863486-abf9dbad1b69?q=80&w=1974&auto=format&fit=crop",
                "https://images.unsplash.com/photo-1614926105151-9b75a4ec4886?q=80&w=1974&auto=format&fit=crop"
            ];
            const [currentStory, setCurrentStory] = useState(0);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setCurrentStory((prev) => (prev + 1) % storyImages.length);
                }, 4000);
                return () => clearTimeout(timer);
            }, [currentStory]);
            
            const name = rememberedUser?.name?.split(' ')[0] || 'Hola';

            return (
                 <div className="w-screen h-screen bg-black relative overflow-hidden flex flex-col justify-end">
                    {storyImages.map((src, index) => (
                        <img key={src} src={src} className={`absolute top-0 left-0 w-full h-full object-cover transition-opacity duration-1000 ${index === currentStory ? 'opacity-100 story-image' : 'opacity-0'}`} />
                    ))}
                    <div className="absolute top-4 left-4 right-4 flex space-x-1">
                         {storyImages.map((_, index) => <div key={index} className="h-1 flex-1 bg-white/50 rounded-full"><div className={`h-full bg-white rounded-full ${index === currentStory ? 'animate-progress' : (index < currentStory ? 'w-full' : 'w-0')}`}></div></div>)}
                    </div>
                    <div className="relative z-10 p-8 text-white bg-gradient-to-t from-black/80 to-transparent">
                        <h1 className="text-4xl font-bold">Hola, {name}</h1>
                        <p className="text-white/80 mb-6">Bienvenido de nuevo</p>
                        <button onClick={onShowPasswordModal} className="w-full bg-blue-500 text-white font-bold p-4 rounded-lg hover:bg-blue-600 transition-transform transform hover:scale-105">
                            Ingresar
                        </button>
                        <p className="text-xs text-white/60 mt-4 text-center">¿No eres {name}? <a href="#" onClick={(e) => { e.preventDefault(); onShowConfirmLogout(); }} className="font-bold text-white/80 hover:underline">Usar otra cuenta</a></p>
                    </div>
                </div>
            );
        };
        
        const PasswordModal = ({ onClose, onLoginSuccess, userEmail }) => {
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);

                const { error } = await window.supabase.auth.signInWithPassword({ 
                    email: userEmail, 
                    password 
                });

                if (error) {
                    setError(error.message);
                } else {
                    onLoginSuccess();
                }
                setLoading(false);
            };

            return (
                <div className="modal-overlay fade-in">
                    <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-[370px] bg-gradient-to-t from-slate-900 to-slate-800 rounded-t-3xl p-6 shadow-2xl">
                         <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 font-bold text-2xl hover:text-white">×</button>
                         <div className="text-center mb-6">
                            <h3 className="font-bold text-xl text-white mt-3">Acceso Seguro</h3>
                            <p className="text-slate-400 text-sm">Ingresa tu contraseña para continuar</p>
                         </div>
                         <form onSubmit={handleLogin}>
                            <div className="relative">
                                <input type="password" placeholder="Contraseña" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 pl-12 bg-slate-700 text-white rounded-lg border-2 border-slate-600 focus:border-blue-500 focus:ring-0 focus:outline-none transition-all" autoFocus required />
                                <svg className="w-6 h-6 absolute left-4 top-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            </div>
                             {error && <p className="text-red-500 text-xs text-center mt-2">{error}</p>}
                             <button type="submit" disabled={loading} className="w-full mt-6 bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold p-4 rounded-lg hover:shadow-lg transition-all transform hover:scale-105 disabled:bg-indigo-400">
                                {loading ? 'Confirmando...' : 'Confirmar'}
                            </button>
                        </form>
                    </div>
                </div>
            )
        };

        const ConfirmLogoutModal = ({ onConfirm, onCancel }) => {
            return (
                <div className="modal-overlay fade-in">
                    <div className="glass rounded-2xl p-8 w-full max-w-sm shadow-lg m-4">
                        <h3 className="font-bold text-xl text-slate-800 mb-2 text-center">¿Cerrar Sesión?</h3>
                        <p className="text-slate-600 text-sm text-center mb-6">Se eliminará la cuenta guardada y deberás iniciar sesión de nuevo.</p>
                        <div className="flex justify-center space-x-4">
                            <button onClick={onCancel} className="w-full bg-slate-300 text-slate-800 font-bold p-3 rounded-lg hover:bg-slate-400 transition-colors">
                                Cancelar
                            </button>
                            <button onClick={onConfirm} className="w-full bg-red-500 text-white font-bold p-3 rounded-lg hover:bg-red-600 transition-colors">
                                Cerrar Sesión
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [session, setSession] = useState(null);
            const [rememberedUser, setRememberedUser] = useState(null);
            const [patientProfile, setPatientProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [tab, setTab] = useState('home');
            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [showConfirmLogout, setShowConfirmLogout] = useState(false);
            const [showInstallBanner, setShowInstallBanner] = useState(false);
            const [installEvent, setInstallEvent] = useState(null);
            const [showNotifications, setShowNotifications] = useState(false);
            const [showAppointmentDetails, setShowAppointmentDetails] = useState(false);
            const [showCheckupDetails, setShowCheckupDetails] = useState(false);
            const [selectedCheckup, setSelectedCheckup] = useState(null);
            const [showAgendaForm, setShowAgendaForm] = useState(false);
            const [showFichaMedica, setShowFichaMedica] = useState(false);
            const [showHistorialMedico, setShowHistorialMedico] = useState(false);
            const [showRecetasActivas, setShowRecetasActivas] = useState(false);
            const [showEmergencyProfile, setShowEmergencyProfile] = useState(false);
            const [showAiChat, setShowAiChat] = useState(false);

            const fetchProfile = useCallback(async (user) => {
                if (!user) {
                    setLoading(false);
                    return;
                }
                const { data, error } = await window.supabase.from('patients').select('*').eq('id', user.id).single();
                if (error) {
                    console.error("Error fetching profile:", error.message);
                } else {
                    setPatientProfile(data);
                }
                setLoading(false); 
            }, []);

            const handleSoftLogout = useCallback(async () => {
                 await window.supabase.auth.signOut();
            }, []);

            useEffect(() => {
                const remembered = JSON.parse(localStorage.getItem('rememberedUser'));
                setRememberedUser(remembered);

                const { data: { subscription } } = window.supabase.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                    if (session?.user) {
                        fetchProfile(session.user);
                    } else {
                        setPatientProfile(null);
                        setLoading(false);
                    }
                });
                
                window.supabase.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                     if (!session?.user) {
                        setLoading(false);
                    }
                });

                const handleBeforeInstallPrompt = (e) => { e.preventDefault(); setInstallEvent(e); setShowInstallBanner(true); };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                
                const handleVisibilityChange = () => {
                    if (document.hidden) {
                        handleSoftLogout();
                    }
                };

                document.addEventListener('visibilitychange', handleVisibilityChange);

                return () => {
                    subscription?.unsubscribe();
                    window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                };
            }, [fetchProfile, handleSoftLogout]);

            const handleLoginSuccess = useCallback(async () => {
                setLoading(true);
                const { data: { session } } = await window.supabase.auth.getSession();
                setSession(session);
                
                const remembered = JSON.parse(localStorage.getItem('rememberedUser'));
                setRememberedUser(remembered);
                
                if (session?.user) {
                    await fetchProfile(session.user);
                }
                setShowPasswordModal(false);
                setTab('home');
            }, [fetchProfile]);

            const handleHardLogout = async () => {
                await window.supabase.auth.signOut();
                localStorage.removeItem('rememberedUser');
                setRememberedUser(null);
                setPatientProfile(null);
                setShowConfirmLogout(false);
            };
            
            const handleShowCheckupDetails = (checkup) => {
                setSelectedCheckup(checkup);
                setShowCheckupDetails(true);
            };

            if (loading) {
                return <div className="w-screen h-screen flex items-center justify-center bg-slate-800 text-white"><p>Cargando...</p></div>;
            }
            
            if (session) {
                 return (
                    <div className="w-screen h-screen bg-gradient-to-tr from-cyan-100 to-blue-200 relative overflow-hidden">
                        {/* Main content and tabs */}
                        <div className="p-6 h-full pb-28 overflow-y-auto scrollbar-hide">
                           {tab === 'home' && <HomeTab profile={patientProfile} onShowNotifications={() => setShowNotifications(true)} onShowAppointmentDetails={() => setShowAppointmentDetails(true)} />}
                           {tab === 'consultas' && <ConsultasTab patientId={session.user.id} onAgendar={() => setShowAgendaForm(true)} onAskAi={() => setShowAiChat(true)} />}
                           {tab === 'chequeos' && <ChequeosTab patientId={session.user.id} onShowDetails={handleShowCheckupDetails} />}
                           {tab === 'perfil' && <PerfilTab profile={patientProfile} loading={!patientProfile} onShowFichaMedica={() => setShowFichaMedica(true)} onShowHistorialMedico={() => setShowHistorialMedico(true)} onShowRecetasActivas={() => setShowRecetasActivas(true)} onShowEmergencyProfile={() => setShowEmergencyProfile(true)} onLogout={handleSoftLogout} />}
                        </div>

                        {/* Navigation Bar */}
                        <nav className="absolute bottom-6 left-6 right-6 h-20 bg-white/60 backdrop-blur-md rounded-full flex items-center justify-around shadow-lg">
                            <NavButton id="home" label="Inicio" icon={<HomeIcon />} activeTab={tab} setTab={setTab} />
                            <NavButton id="consultas" label="Consultas" icon={<ConsultasIcon />} activeTab={tab} setTab={setTab} />
                            <NavButton id="chequeos" label="Chequeos" icon={<ChequeosIcon />} activeTab={tab} setTab={setTab} />
                            <NavButton id="perfil" label="Perfil" icon={<PerfilIcon />} activeTab={tab} setTab={setTab} />
                        </nav>
                        
                        {/* Full-screen modals that should be contained */}
                        {showNotifications && <NotificationPanel onClose={() => setShowNotifications(false)} patientId={session.user.id} />}
                        {showAppointmentDetails && <AppointmentDetailsModal onClose={() => setShowAppointmentDetails(false)} />}
                        {showCheckupDetails && <CheckupDetailsModal checkup={selectedCheckup} onClose={() => setShowCheckupDetails(false)} />}
                        {showAgendaForm && <AgendaForm onClose={() => setShowAgendaForm(false)} />}
                        {patientProfile && showFichaMedica && <FichaMedicaModal onClose={() => setShowFichaMedica(false)} patientData={patientProfile} />}
                        {patientProfile && showHistorialMedico && <HistorialMedicoScreen onClose={() => setShowHistorialMedico(false)} patientId={session.user.id} />}
                        {patientProfile && showRecetasActivas && <RecetasActivasModal onClose={() => setShowRecetasActivas(false)} patientId={session.user.id} />}
                        {showEmergencyProfile && <EmergencyProfileScreen onClose={() => setShowEmergencyProfile(false)} />}
                        {showAiChat && <AiChatScreen onClose={() => setShowAiChat(false)} />}
                    </div>
                );
            }
            
            if (rememberedUser) {
                return (
                    <React.Fragment>
                        <PreLoginScreen rememberedUser={rememberedUser} onShowPasswordModal={() => setShowPasswordModal(true)} onShowConfirmLogout={() => setShowConfirmLogout(true)} />
                        {showPasswordModal && <PasswordModal userEmail={rememberedUser.email} onClose={() => setShowPasswordModal(false)} onLoginSuccess={handleLoginSuccess} />}
                        {showConfirmLogout && <ConfirmLogoutModal onConfirm={handleHardLogout} onCancel={() => setShowConfirmLogout(false)} />}
                    </React.Fragment>
                );
            }

            return <LoginScreen 
                onLoginSuccess={handleLoginSuccess}
                showInstallBanner={showInstallBanner}
                installEvent={installEvent}
                setShowInstallBanner={setShowInstallBanner}
            />;
        };
        
        const HomeTab = ({ profile, onShowNotifications, onShowAppointmentDetails }) => {
            const healthScore = 92;
            const getScoreColor = (score) => {
                if (score > 75) return { ring: '#4ade80', text: 'text-green-500' };
                if (score > 50) return { ring: '#facc15', text: 'text-yellow-500' };
                return { ring: '#ef4444', text: 'text-red-500' };
            };
            const scoreColor = getScoreColor(healthScore);
            const name = profile?.full_name?.split(' ')[0] || '...';
            
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h1 className="text-3xl font-bold text-slate-800">¡Hola, {name}!</h1>
                        <button onClick={onShowNotifications} className="w-10 h-10 bg-white/70 rounded-full flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-blue-400"><BellIcon /></button>
                    </div>
                    <div className="glass rounded-3xl p-6 flex flex-col items-center text-center shadow-md">
                        <p className="font-medium text-slate-600 mb-2">Puntuación de Salud <span className="text-xs">ⓘ</span></p>
                        <div className="w-40 h-40 rounded-full flex items-center justify-center" style={{ background: `conic-gradient(${scoreColor.ring} 0% ${healthScore}%, #e5e7eb ${healthScore}% 100%)`}}>
                            <div className="w-[125px] h-[125px] bg-white/80 rounded-full flex items-center justify-center">
                                <span className={`text-5xl font-extrabold ${scoreColor.text}`}>{healthScore}</span>
                            </div>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                         <div className="glass p-4 rounded-2xl shadow-sm col-span-1 flex flex-col">
                            <div className="flex justify-between items-start mb-2">
                                <p className="text-sm font-medium text-slate-600">Próxima Cita</p>
                                <div className="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center flex-shrink-0"><CalendarIcon className="h-5 w-5 text-blue-600"/></div>
                            </div>
                            <div className="flex-grow">
                                <p className="text-md font-bold text-slate-800">Dr. Pérez</p>
                                <p className="text-sm text-slate-600">Dic 12, 10:30 AM</p>
                            </div>
                            <button onClick={onShowAppointmentDetails} className="text-xs text-blue-600 font-bold mt-3 text-left w-full">Ver detalles →</button>
                        </div>
                        <div className="glass p-4 rounded-2xl shadow-sm space-y-2">
                             <p className="text-sm font-medium text-slate-600">Chequeos Pendientes</p>
                             <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center"><ClipboardListIcon className="h-5 w-5 text-blue-500"/></div>
                                <div><p className="text-xs font-semibold text-slate-800">Dentista</p><p className="text-xs text-slate-500">En 2 días</p></div>
                             </div>
                             <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 bg-purple-100 rounded-lg flex items-center justify-center"><EyeIcon className="h-5 w-5 text-purple-600" /></div>
                                <div><p className="text-xs font-semibold text-slate-800">Oftalmología</p><p className="text-xs text-slate-500">En 1 semana</p></div>
                             </div>
                        </div>
                    </div>
                    <h2 className="text-xl font-bold text-slate-800 pt-2">Tus Datos</h2>
                     <div className="grid grid-cols-2 gap-4">
                        <div className="glass p-4 rounded-2xl">
                           <div className="flex justify-between items-start"><div><p className="text-sm font-semibold text-slate-600">Pasos</p></div><span className="text-blue-500 font-bold">!!</span></div>
                            <svg viewBox="0 0 100 40" className="mt-2"><polyline className="chart-line" stroke="#38bdf8" points="0,30 15,20 30,25 45,15 60,18 75,10 90,15 100,5" /></svg>
                            <div className="flex justify-between text-xs text-slate-400 mt-1"><p>1,000</p><p>8,500</p></div>
                        </div>
                        <div className="glass p-4 rounded-2xl">
                            <div className="flex justify-between items-start"><div><p className="text-sm font-semibold text-slate-600">Ritmo Cardiaco</p></div><HeartIcon className="h-5 w-5 text-red-500"/></div>
                            <svg viewBox="0 0 100 40" className="mt-2"><polyline className="chart-line" stroke="#ef4444" points="0,20 10,20 15,10 20,30 25,15 30,22 35,20 40,20 45,10 50,30 55,15 60,22 65,20 70,20 75,10 80,30 85,15 90,22 95,20 100,20" /></svg>
                            <div className="flex justify-between text-xs text-slate-400 mt-1"><p>60</p><p>120</p></div>
                        </div>
                        <div className="glass p-4 rounded-2xl">
                           <div className="flex justify-between items-start"><div><p className="text-sm font-semibold text-slate-600">Horas de Sueño</p></div><MoonIcon className="h-5 w-5 text-purple-500"/></div>
                            <svg viewBox="0 0 100 40" className="mt-2">
                                <rect className="sleep-bar" x="5" y="15" width="10" height="25" rx="2"/><rect className="sleep-bar" x="20" y="10" width="10" height="30" rx="2"/><rect className="sleep-bar" x="35" y="20" width="10" height="20" rx="2"/><rect className="sleep-bar" x="50" y="5" width="10" height="35" rx="2"/><rect className="sleep-bar" x="65" y="12" width="10" height="28" rx="2"/><rect className="sleep-bar" x="80" y="25" width="10" height="15" rx="2"/>
                            </svg>
                            <div className="flex justify-between text-xs text-slate-400 mt-1"><p>4h</p><p>8h</p></div>
                        </div>
                        <div className="glass p-4 rounded-2xl">

            const [filter, setFilter] = useState(null);
            const [showFilterModal, setShowFilterModal] = useState(false);

            useEffect(() => {
                const fetchConsultations = async () => {
                    if (!patientId) {
                        setLoading(false);
                        return;
                    }
                    try {
                        const { data, error } = await window.supabase
                            .from('medical_history')
                            .select('*')
                            .eq('patient_id', patientId)
                            .eq('type', 'consulta')
                            .order('date', { ascending: false });
                        if (error) throw error;
                        setHistory(data);
                    } catch (error) {
                        setError(error.message);
                        console.error("Error fetching consultations:", error.message);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchConsultations();
            }, [patientId]);

            const specialties = useMemo(() => {
                const allSpecialties = history.map(item => item.specialty).filter(Boolean);
                return [...new Set(allSpecialties)];
            }, [history]);

            const filteredHistory = useMemo(() => {
                if (!filter) return history;
                return history.filter(item => item.specialty === filter);
            }, [history, filter]);

            const icons = { 
                'Medicina General': <UserIcon className="h-5 w-5 text-blue-600"/>, 
                'Oftalmología': <EyeIcon className="h-5 w-5 text-purple-600"/>,
                'Cardiología': <HeartIcon className="h-5 w-5 text-red-600"/>

            return (
                <React.Fragment>
                    {showFilterModal && 
                        <FilterModal 
                            options={specialties} 
                            activeFilter={filter} 
                            onClose={() => setShowFilterModal(false)} 
                            onApplyFilter={(newFilter) => { setFilter(newFilter); setShowFilterModal(false); }}

                            <button onClick={() => setShowFilterModal(true)} className="flex items-center text-blue-600 text-sm font-semibold glass rounded-lg px-3 py-1">
                                <FilterIcon /> {filter ? filter : 'Filtrar'}

                        </div>
                        {loading && <p className="text-center text-slate-600">Cargando consultas...</p>}
                        {error && <p className="text-center text-red-500">{error}</p>}

                                <p className="font-bold text-slate-700">No hay consultas</p>
                                <p className="text-sm text-slate-500">{filter ? `No se encontraron consultas para "${filter}".` : 'No tienes consultas previas registradas.'}</p>
                            </div>

                                            {icons[item.specialty] || <UserIcon className="h-5 w-5 text-gray-600"/>}

                                        <div className="glass p-4 rounded-xl">
                                            <p className="font-bold text-slate-700 text-sm">{item.specialty.toUpperCase()}</p>
                                            <p className="text-xs text-slate-500">{new Date(item.date).toLocaleDateString('es-ES', { year: 'numeric', month: 'short', day: 'numeric' })} - {item.doctor}</p>
                                            <p className="text-xs text-slate-600 mt-1">{item.summary}</p>
                                            <button className="text-xs font-bold text-blue-600 mt-2">Ver detalles</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </React.Fragment>
            );

        const FilterModal = ({ options, activeFilter, onClose, onApplyFilter }) => (
            <div className="modal-overlay fade-in">
                <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-[370px] bg-gradient-to-t from-slate-800 to-slate-700 rounded-t-3xl p-6 shadow-2xl">
                    <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 font-bold text-2xl hover:text-white">×</button>
                    <h3 className="font-bold text-xl text-white mb-4 text-center">Filtrar por Especialidad</h3>

                            Todas las especialidades
                        </button>
                        {options.map(option => (
                             <button key={option} onClick={() => onApplyFilter(option)} className={`w-full p-3 text-left rounded-lg text-sm transition-colors ${activeFilter === option ? 'bg-blue-500 text-white' : 'bg-slate-600 text-slate-200'}`}>
                                {option}
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );

        const AgendaForm = ({ onClose }) => {
            const [step, setStep] = useState('selection');
            const [searchTerm, setSearchTerm] = useState('');
            const [allDoctors, setAllDoctors] = useState([]);
            const [filteredDoctors, setFilteredDoctors] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [selectedTime, setSelectedTime] = useState('10:00');
            const [selectedDoctor, setSelectedDoctor] = useState(null);
            const [isVideoconsulta, setIsVideoconsulta] = useState(false);

            useEffect(() => {
                const fetchDoctors = async () => {
                    const { data, error } = await window.supabase.from('doctors').select('*');
                    if (error) {
                        console.error("Error fetching doctors:", error);
                    } else {
                         const doctorsWithImages = data.map(doc => ({
                            ...doc,
                            img: doc.avatar_filename || 'https://placehold.co/128x128'
                        }));
                        setAllDoctors(doctorsWithImages);
                        setFilteredDoctors(doctorsWithImages);
                    }
                    setLoading(false);
                };
                fetchDoctors();
            }, []);

            useEffect(() => {
                const lowerCaseSearch = searchTerm.toLowerCase();
                const timer = setTimeout(() => {
                    const filtered = allDoctors.filter(doc => 
                        doc.name.toLowerCase().includes(lowerCaseSearch) ||
                        doc.specialty.toLowerCase().includes(lowerCaseSearch)
                    );
                    setFilteredDoctors(filtered);
                }, 200);
                return () => clearTimeout(timer);
            }, [searchTerm, allDoctors]);

            const handleSelectDoctor = (doctor) => {
                setSelectedDoctor(prevDoctor => prevDoctor && prevDoctor.id === doctor.id ? null : doctor);
            };

            const getNextFiveDays = () => {
                const days = [];
                const dayNames = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
                for (let i = 0; i < 5; i++) {
                    const date = new Date();
                    date.setDate(date.getDate() + i);
                    days.push({ dayName: dayNames[date.getDay()], dayNum: date.getDate(), fullDate: date });
                }
                return days;
            };

            const dates = getNextFiveDays();
            const times = ['09:00','10:00','11:00','12:00','14:00','15:00','16:00','17:00'];
            
            if (step === 'confirmation') {
                return (
                    <div className="modal-fullscreen bg-gradient-to-tr from-cyan-100 to-blue-200 p-6">
                        <div className="flex items-center mb-4"><button onClick={() => setStep('selection')} className="text-slate-700"><ChevronLeftIcon /></button><h2 className="text-xl font-bold text-slate-800 ml-4">Confirmar Cita</h2></div>
                        <div className="glass p-6 rounded-2xl text-center space-y-4">
                            <img src={selectedDoctor.img} className="w-24 h-24 rounded-full mx-auto border-4 border-white" />
                            <div><p className="text-2xl font-bold text-slate-800">{selectedDoctor.name}</p><p className="text-slate-600">{selectedDoctor.specialty}</p></div>
                            <div className="text-left space-y-3 pt-4">
                                <div className="flex items-center"><CalendarIcon className="h-5 w-5 text-slate-500 mr-3"/><p>{selectedDate.toLocaleDateString('es-ES', {weekday: 'long', day: 'numeric', month: 'long'})}</p></div>
                                <div className="flex items-center"><ClockIcon className="h-5 w-5 text-slate-500 mr-3"/><p>{selectedTime}</p></div>
                                <div className="flex items-center"><VideoCameraIcon className="h-5 w-5 text-slate-500 mr-3"/><p>{isVideoconsulta ? 'Videoconsulta' : 'Presencial'}</p></div>
                            </div>
                        </div>
                        <button onClick={onClose} className="w-full mt-6 bg-indigo-600 text-white font-bold p-4 rounded-lg hover:bg-indigo-700 transition-colors">Confirmar y Agendar</button>
                    </div>
                )
            }

            return (
                <div className="modal-fullscreen bg-gradient-to-tr from-cyan-100 to-blue-200">
                    <div className="p-6 h-full flex flex-col">
                        <div className="flex items-center mb-4"><button onClick={onClose} className="text-slate-700"><ChevronLeftIcon /></button><h2 className="text-xl font-bold text-slate-800 ml-4">Agendar Consulta</h2></div>
                        <div className="relative mb-4">
                            <input type="text" placeholder="Buscar Especialidad o Médico" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full p-3 pl-10 rounded-lg bg-white/80 border-2 border-transparent focus:border-blue-400 focus:ring-0 focus:outline-none text-sm" />
                            <SearchIcon className="absolute left-3 top-3.5 h-5 w-5 text-slate-400" />
                        </div>
                        <div className="flex justify-between mb-4 space-x-2">
                             {dates.map(date => <div key={date.dayNum} onClick={() => setSelectedDate(date.fullDate)} className={`w-1/5 rounded-lg text-center p-2 cursor-pointer transition-colors ${selectedDate.getDate() === date.dayNum ? 'bg-blue-600 text-white' : 'bg-white/70'}`}><p className="text-xs">{date.dayName}</p><p className="font-bold text-lg">{date.dayNum}</p></div>)}
                        </div>
                        <div className="grid grid-cols-4 gap-2 mb-4">
                             {times.map(time => <button key={time} onClick={() => setSelectedTime(time)} className={`p-2 rounded-lg text-sm transition-colors ${selectedTime === time ? 'bg-blue-600 text-white' : 'bg-white/70'}`}>{time}</button>)}
                        </div>
                        <div className="flex justify-between items-center glass p-3 rounded-lg mb-6">
                            <span className="text-sm font-semibold text-slate-700">Videoconsulta</span>
                            <div onClick={() => setIsVideoconsulta(!isVideoconsulta)} className={`w-12 h-6 flex items-center rounded-full p-1 cursor-pointer transition-colors ${isVideoconsulta ? 'bg-blue-500' : 'bg-slate-300'}`}><div className={`bg-white w-4 h-4 rounded-full shadow-md transform transition-transform duration-300 ease-in-out ${isVideoconsulta ? 'translate-x-6' : ''}`}></div></div>
                        </div>
                        <div className="flex-grow space-y-3 overflow-y-auto scrollbar-hide">
                             {loading ? <p className="text-center text-slate-600">Cargando doctores...</p> :
                                filteredDoctors.map(doc => <div key={doc.id} className={`glass rounded-lg flex items-center p-3 transition-all duration-300 ease-in-out`}><img src={doc.img} className="w-12 h-12 rounded-full" /><div className="flex-grow ml-3"><p className="text-sm font-bold text-slate-800">{doc.name}</p><p className="text-xs text-slate-600">{doc.specialty}</p><span className="text-xs">⭐ {doc.rating}</span></div><button onClick={() => handleSelectDoctor(doc)} disabled={selectedDoctor && selectedDoctor.id !== doc.id} className={`text-white text-xs font-bold px-4 py-2 rounded-lg transition-colors ${selectedDoctor && selectedDoctor.id === doc.id ? 'bg-green-500 hover:bg-green-600' : (selectedDoctor ? 'bg-slate-400' : 'bg-blue-500 hover:bg-blue-600')}`}>{selectedDoctor && selectedDoctor.id === doc.id ? 'SELECCIONADO' : 'RESERVAR'}</button></div>)}
                        </div>
                        {selectedDoctor && <button onClick={() => setStep('confirmation')} className="w-full mt-4 bg-blue-600 text-white font-bold p-4 rounded-lg hover:bg-blue-700 transition-transform transform hover:scale-105">Siguiente</button>}
                    </div>
                </div>
            )
        };

        const AiChatScreen = ({ onClose }) => {
            const [messages, setMessages] = useState([
                { from: 'ai', text: 'Hola, soy tu asistente de salud. Puedo ofrecerte información general sobre síntomas, condiciones y bienestar. ¿En qué puedo ayudarte hoy? \n\n*Recuerda: No soy un doctor. La información proporcionada no debe sustituir el consejo médico profesional.*' }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim()) return;

                const userMessage = { from: 'user', text: input };
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setLoading(true);

                // Llamada a la Edge Function de Supabase
                try {
                    const { data, error } = await window.supabase.functions.invoke('ask-gemini', {
                        body: { query: input },
                    });

                    if (error) throw error;

                    const aiMessage = { from: 'ai', text: data.reply };
                    setMessages(prev => [...prev, aiMessage]);

                } catch (error) {
                    console.error("Error calling Edge Function:", error);
                    const errorMessage = { from: 'ai', text: 'Lo siento, no pude procesar tu solicitud. Asegúrate de que la Edge Function \'ask-gemini\' esté desplegada y la clave de API sea correcta.' };
                    setMessages(prev => [...prev, errorMessage]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="modal-fullscreen fade-in p-6 flex flex-col">
                    <div className="flex items-center mb-4 flex-shrink-0">
                        <button onClick={onClose} className="text-slate-700"><ChevronLeftIcon /></button>
                        <h2 className="text-xl font-bold text-slate-800 ml-4">Asistente de IA</h2>
                    </div>
                    <div className="flex-grow overflow-y-auto space-y-4 pb-4 scrollbar-hide">
                        {messages.map((msg, index) => (
                            <div key={index} className={`flex items-end gap-2 ${msg.from === 'user' ? 'justify-end' : ''}`}>
                                {msg.from === 'ai' && <div className="w-8 h-8 bg-purple-500 rounded-full flex items-center justify-center text-white flex-shrink-0"><SparklesIcon /></div>}
                                <div className={`max-w-[80%] p-3 rounded-2xl ${msg.from === 'user' ? 'bg-blue-500 text-white rounded-br-none' : 'bg-white/80 text-slate-800 rounded-bl-none'}`}>
                                    <p className="text-sm whitespace-pre-wrap">{msg.text}</p>
                                </div>
                            </div>
                        ))}
                        {loading && (
                            <div className="flex items-end gap-2">
                                <div className="w-8 h-8 bg-purple-500 rounded-full flex items-center justify-center text-white flex-shrink-0"><SparklesIcon /></div>
                                <div className="max-w-[80%] p-3 rounded-2xl bg-white/80 text-slate-800 rounded-bl-none">
                                    <div className="flex items-center gap-2">
                                        <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce"></div>
                                        <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce [animation-delay:-.3s]"></div>
                                        <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce [animation-delay:-.5s]"></div>
                                    </div>
                                </div>
                            </div>
                        )}
                         <div ref={chatEndRef} />
                    </div>
                    <form onSubmit={handleSend} className="flex-shrink-0 flex items-center gap-2 pt-2">
                        <input 
                            type="text" 
                            value={input} 
                            onChange={(e) => setInput(e.target.value)} 
                            className="w-full p-3 rounded-full bg-white/90 border-2 border-transparent focus:border-blue-400 focus:ring-0 focus:outline-none text-sm transition-all" 
                            placeholder="Escribe tu pregunta..." 
                            disabled={loading}
                        />
                        <button type="submit" disabled={loading || !input.trim()} className="w-12 h-12 bg-blue-500 text-white rounded-full flex items-center justify-center flex-shrink-0 disabled:bg-blue-300 transition-colors">
                            <SendIcon />
                        </button>
                    </form>
                </div>
            );
        };

        const ChequeosTab = ({ patientId, onShowDetails }) => {
            const [checkups, setCheckups] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const fetchCheckups = async () => {
                    if (!patientId) {
                        setLoading(false);
                        return;
                    }
                    try {
                        const today = new Date().toISOString();
                        const { data, error } = await window.supabase
                            .from('checkups')
                            .select('*')
                            .eq('patient_id', patientId)
                            .gt('date', today)
                            .order('date', { ascending: true });

                        if (error) throw error;
                        setCheckups(data);
                    } catch (error) {
                        setError(error.message);
                        console.error("Error fetching checkups:", error.message);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchCheckups();
            }, [patientId]);

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h1 className="text-3xl font-bold text-slate-800">Chequeos Médicos</h1>
                    </div>
                    <p className="text-slate-600">Aquí puedes ver tus próximos chequeos médicos de rutina.</p>
                    <div className="space-y-3">
                        {loading && <p className="text-center text-slate-600">Cargando chequeos...</p>}
                        {error && <p className="text-center text-red-500">{error}</p>}
                        {!loading && !error && checkups.length === 0 && (
                            <div className="text-center py-10 glass rounded-2xl">
                                <p className="font-bold text-slate-700">¡Todo en orden!</p>
                                <p className="text-sm text-slate-500">No tienes chequeos futuros programados.</p>
                            </div>
                        )}
                        {!loading && !error && checkups.map((check) => (
                            <div key={check.id} className="glass p-4 rounded-xl">
                                <p className="font-bold text-slate-800">{check.name}</p>
                                <p className="text-sm text-slate-600">Fecha: {new Date(check.date).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                <div className="mt-2 flex justify-between items-center">
                                    <span className={`text-xs font-semibold px-2 py-1 rounded-full ${check.status === 'Pendiente' ? 'bg-yellow-200 text-yellow-800' : 'bg-green-200 text-green-800'}`}>{check.status}</span>
                                    <button onClick={() => onShowDetails(check)} className="text-xs font-bold text-blue-600">Ver detalles</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const PerfilTab = ({ profile, loading, onShowFichaMedica, onShowHistorialMedico, onShowRecetasActivas, onShowEmergencyProfile, onLogout }) => {
            if (loading) {
                return <div className="text-center pt-20"><p>Cargando perfil...</p></div>;
            }

            if (!profile) {
                 return (
                    <div className="text-center pt-10">
                        <h2 className="text-2xl font-bold text-slate-800 mb-4">Perfil no encontrado</h2>
                        <p className="text-slate-600 mb-6">Parece que aún no has completado tu perfil de paciente. </p>
                         <button onClick={onLogout} className="w-full flex items-center justify-center bg-gradient-to-r from-red-500 to-orange-500 text-white font-bold p-3 rounded-2xl hover:shadow-xl transition-all transform hover:scale-105">
                            <LogoutIcon />
                            <span>Cerrar Sesión</span>
                        </button>
                    </div>
                );
            }

            const hasProfilePic = !!profile.profile_pic_url;

            return (
                <div className="space-y-6">
                    <h1 className="text-3xl font-bold text-slate-800">Mi Salud</h1>
                    <div className="glass rounded-2xl p-4 flex items-center space-x-4">
                        {hasProfilePic ? (
                            <img src={profile.profile_pic_url} className="w-16 h-16 rounded-full border-2 border-white" />
                        ) : (
                            <div className="w-16 h-16 rounded-full border-2 border-white bg-slate-200 flex items-center justify-center">
                                <ProfilePlaceholderIcon className="w-10 h-10 text-slate-400" />
                            </div>
                        )}
                        <div>
                            <p className="font-bold text-lg text-slate-800">{profile.full_name || 'Nombre no disponible'}</p>
                            <p className="text-sm text-slate-600">NSS: {profile.nss || 'No disponible'}</p>
                            {profile.is_verified && (
                                <span className="text-xs font-semibold inline-flex items-center px-2.5 py-0.5 rounded-full bg-green-100 text-green-800 mt-1">
                                    <CheckCircleIcon className="w-4 h-4 mr-1" />
                                    Paciente Verificado
                                </span>
                            )}
                        </div>
                    </div>
                    <div onClick={onShowFichaMedica} className="glass rounded-2xl p-4 flex justify-between items-center cursor-pointer">
                        <div>
                            <p className="font-bold text-slate-800">Ficha Médica</p>
                            <p className="text-sm text-slate-600">Tipificación: {profile.blood_type || 'N/A'}, Alergias: {profile.allergies || 'N/A'}</p>
                        </div>
                        <ChevronRightIcon />
                    </div>
                    <div onClick={onShowHistorialMedico} className="glass rounded-2xl p-4 flex justify-between items-center cursor-pointer">
                        <p className="font-bold text-slate-800">Historial Médico</p>
                        <ChevronRightIcon />
                    </div>
                    <div onClick={onShowRecetasActivas} className="glass rounded-2xl p-4 flex justify-between items-center cursor-pointer">
                        <p className="font-bold text-slate-800">Recetas Activas</p>
                        <ChevronRightIcon />
                    </div>
                    <div onClick={onShowEmergencyProfile} className="bg-gradient-to-r from-blue-500 to-indigo-600 rounded-2xl p-4 text-white flex items-center justify-center space-x-2 cursor-pointer">
                        <QrCodeIcon />
                        <p className="font-bold">PERFIL DE EMERGENCIA (QR)</p>
                    </div>
                     <div className="pt-4">
                        <button onClick={onLogout} className="w-full flex items-center justify-center bg-gradient-to-r from-red-500 to-orange-500 text-white font-bold p-3 rounded-2xl hover:shadow-xl transition-all transform hover:scale-105">
                            <LogoutIcon />
                            <span>Cerrar Sesión</span>
                        </button>
                    </div>
                </div>
            )
